name: Daily Favorites Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Send Feishu report
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "x-report-token: $REPORT_TOKEN" \
            "$FAVORITES_API_BASE/api/report/send"
        env:
          FAVORITES_API_BASE: https://predict-favorites.aihuman750.workers.dev
          REPORT_TOKEN: ${{ secrets.REPORT_TOKEN }}
