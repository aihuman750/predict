name: Daily Favorites Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Send Feishu report
        run: node scripts/send-report.mjs
        env:
          FAVORITES_API_BASE: https://predict-favorites.aihuman750.workers.dev
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

      - name: Commit price snapshot
        run: |
          if [ -z "$(git status --porcelain -- reports/price-state.json)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/price-state.json
          git commit -m "Update daily report price snapshot"
          git push
