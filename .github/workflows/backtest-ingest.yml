name: Backtest Ingestion

on:
  schedule:
    - cron: "25 2 * * *"
  workflow_dispatch:
    inputs:
      start:
        description: "UTC start day, YYYY-MM-DD"
        required: false
      end:
        description: "UTC end day, YYYY-MM-DD"
        required: false
      intervals:
        description: "Comma-separated intervals"
        default: "1h,15m,5m"
        required: false
      reset:
        description: "Use true/all to delete all backtest rows, or matches to delete only match rows"
        default: "false"
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Reset backtest tables
        if: ${{ github.event.inputs.reset != '' && github.event.inputs.reset != 'false' }}
        env:
          BACKTEST_D1_DATABASE_ID: ${{ secrets.BACKTEST_D1_DATABASE_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RESET_MODE: ${{ github.event.inputs.reset }}
        run: |
          node --input-type=module <<'NODE'
          import { executeD1 } from "./scripts/backtest-ingest.mjs";

          const mode = String(process.env.RESET_MODE || "false").toLowerCase();
          const sqls = ["DELETE FROM backtest_matches"];
          if (mode === "true" || mode === "all") {
            sqls.push(
              "DELETE FROM backtest_daily_matrices",
              "DELETE FROM backtest_markets",
              "DELETE FROM backtest_ingestion_runs",
            );
          }
          for (const sql of sqls) {
            await executeD1(sql);
          }
          NODE

      - name: Ingest backtest data
        env:
          BACKTEST_D1_DATABASE_ID: ${{ secrets.BACKTEST_D1_DATABASE_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PREDICT_API_KEY: ${{ secrets.PREDICT_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.start }}" ] && [ -n "${{ github.event.inputs.end }}" ]; then
            node scripts/backtest-ingest.mjs \
              --start "${{ github.event.inputs.start }}" \
              --end "${{ github.event.inputs.end }}" \
              --intervals "${{ github.event.inputs.intervals || '1h,15m,5m' }}"
          else
            YESTERDAY="$(date -u -d 'yesterday' +%F)"
            node scripts/backtest-ingest.mjs \
              --day "$YESTERDAY" \
              --intervals "${{ github.event.inputs.intervals || '1h,15m,5m' }}"
          fi
