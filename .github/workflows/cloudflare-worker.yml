name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - "worker/**"
      - "scripts/**"
      - "public/**"
      - "wrangler.toml"
      - ".github/workflows/cloudflare-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set Worker secrets
        run: |
          printf '%s' "$FEISHU_WEBHOOK" | npx wrangler@latest secret put FEISHU_WEBHOOK
          printf '%s' "$FEISHU_SECRET" | npx wrangler@latest secret put FEISHU_SECRET
          printf '%s' "$REPORT_TOKEN" | npx wrangler@latest secret put REPORT_TOKEN
          printf '%s' "$PREDICT_API_KEY" | npx wrangler@latest secret put PREDICT_API_KEY
          printf '%s' "$OPENAI_API_KEY" | npx wrangler@latest secret put OPENAI_API_KEY
          printf '%s' "$SITE_PASSWORD" | npx wrangler@latest secret put SITE_PASSWORD
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PREDICT_API_KEY: ${{ secrets.PREDICT_API_KEY }}
          REPORT_TOKEN: ${{ secrets.REPORT_TOKEN }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Deploy Worker
        run: npx wrangler@latest deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
